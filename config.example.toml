# Vinur — example config.
# Copy to config.toml and edit, then:  python3 -m knowledgehost -c config.toml
# Every key can also be set via env: KNOWLEDGEHOST_<KEY> (e.g. KNOWLEDGEHOST_PORT).

# ── store backend ───────────────────────────────────────────────────────────
#   sqlite -> FTS5 + brute-force dense. Stdlib, no extra service. Great for the
#             PDF collection / Phase 1; fine to ~1M chunks.
#   lance  -> LanceDB IVF-PQ + FTS, on-disk & mmap'd. Scales to a full Wikipedia
#             snapshot (10-40M chunks). Needs:  pip install lancedb
backend   = "sqlite"
db_path   = "var/index.db"     # relative paths anchor to this folder (in-tree by default)
lance_dir = "var/lance"        # lance tables for the lance backend

# ── service ───────────────────────────────────────────────────────────────-─
# Serving another machine (Vinkona lives elsewhere)?  host = "0.0.0.0" AND set
# auth_token — the server refuses a LAN bind without one (/ops runs jobs).
host = "127.0.0.1"      # localhost by default
port = 8771             # 8770 is the music host; co-locate on 8771
auth_token = ""         # if set, /call requires Authorization: Bearer <token>

# ── standalone serving (./vinur.sh) ─────────────────────────────────────────
# What THIS box serves when Vinur runs without Vinkona — e.g. one big-VRAM
# machine hosting the kb plus its own LMs.  Everything declared here (plus the
# kb itself) runs under ./vinur.sh start|stop|status|logs.  Point embed_url /
# rerank_url / distill_urls / extract_urls / verify_urls at the same ports.
# All off by default: ./vinur.sh then just supervises the kb.
#
# Every [[serving.llms]] key, engine = "vllm" (weights fetch into
# var/cache/huggingface on first start; ./install.sh --serving builds the venv):
#
# [[serving.llms]]
# name      = "primary"           # required — the service/swap name (llm-<name>)
# engine    = "vllm"              # required — vllm | llama
# model     = "org/Model-NVFP4"   # required — HF id or local snapshot dir
# port      = 11438               # required — 11438 = distill_urls default
# host      = "127.0.0.1"         # bind (keep localhost; the kb proxies nothing)
# exclusive = true                # can't co-reside with the other exclusive
#                                 #   entries: ONE of them runs, swap loads another
#                                 #   (./vinur.sh swap <name> / POST /serving/swap /
#                                 #   a Prioritizer step's "model" key)
# default   = true                # the exclusive entry that boots at start
#   # ── how vLLM loads the model ──────────────────────────────────────────
# quantization    = "modelopt"    # checkpoint format when detection needs help:
#                                 #   modelopt (NVFP4), fp8, awq, gptq, …
#                                 #   (usually auto-detected — omit first)
# dtype           = "auto"        # compute dtype for unquantized weights
# kv_cache_dtype  = "fp8"         # KV cache precision.  NVFP4/FP8 checkpoints:
#                                 #   set "fp8" — halves KV memory and keeps the
#                                 #   whole path on the 8-bit tensor cores;
#                                 #   default "auto" = the model dtype (16-bit)
# trust_remote_code = false       # required by some architectures' repos
#   # ── how it runs / fits ────────────────────────────────────────────────
# max_model_len          = 16384  # context window actually served (KV budget!)
# gpu_memory_utilization = 0.90   # fraction of VRAM vLLM may claim — resident
#                                 #   PAIRS must sum ≤ ~0.9; a lone exclusive
#                                 #   model can take 0.90
# max_num_seqs           = 32     # concurrent sequences cap (batch pressure)
# tensor_parallel        = 1      # GPUs to shard across
# cpu_offload_gb         = 0      # spill this many GB of weights to RAM (slow,
#                                 #   but lets an oversized model limp in)
# swap_space             = 4      # GB of CPU swap for preempted sequences
# served_model_name      = ""     # the name clients pass as "model" (default: id)
#   # ── escape hatches ────────────────────────────────────────────────────
# env  = { VLLM_ATTENTION_BACKEND = "FLASHINFER" }   # extra process environment
# args = ["--enable-prefix-caching"]  # ANY other `vllm serve` flag — appended
#                                     #   LAST, so it also overrides the above
#
# engine = "llama" entries (a single GGUF via llama-server) take: ctx_size (-c),
# n_gpu_layers (-ngl, default 99), plus the same host/args/env keys.
#
# engine = "container" runs the OFFICIAL vLLM image under podman (or docker)
# instead of the bare-metal venv — the image carries the matched CUDA toolkit
# and compiler, so the host needs ONLY the driver.  The right engine on
# bleeding-edge distros (Fedora!) where nvcc/gcc ceilings break JIT kernels.
# Same keys as "vllm" (they map to the same flags), plus:
# [[serving.llms]]
# name    = "primary"
# engine  = "container"
# model   = "org/Model-NVFP4"
# port    = 11438
# image   = "docker.io/vllm/vllm-openai:v0.11.0"   # PIN a tag (default :latest)
# runtime = ""                    # auto: podman, then docker
# kv_cache_dtype = "fp8"
# max_model_len  = 16384
# gpu_memory_utilization = 0.90
# env = { }                       # goes INTO the container (-e)
# Host setup once:  dnf install podman nvidia-container-toolkit
#                   sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
# Weights still land in var/cache/huggingface (mounted into the image).
#
# [serving.embed]                 # nomic via llama-server --embedding
# enabled = true                  # (GGUF auto-downloads into models/);
#                                 # serves embed_url's port (11437)
# [serving.reranker]
# enabled = true                  # run-reranker.sh on rerank_url's port (cpu)
#
# swap_timeout_s = 900 (top-level in [serving]) bounds a swap's weights-load
# wait.  See serving/README.md for worked 96 GB examples (resident pair and
# exclusive swap mode).

# ── embeddings (the nomic endpoint, shared with Vinkona's memory store) ─────────
embed_url   = "http://127.0.0.1:11437"
embed_model = "nomic-embed-text-v1.5.f16.gguf"
embed_task_prefix     = true
embed_query_prefix    = "search_query: "
embed_document_prefix = "search_document: "
embed_max_tokens      = 512   # clip inputs to the server's per-sequence window (n_ubatch)

# ── ingestion ─────────────────────────────────────────────────────────────-─
# Roots crawled for documents. Layout is not assumed; the tree is walked.
sources    = ["~/Documents", "~/Books"]
extensions = [".pdf", ".epub", ".html", ".htm", ".txt", ".md"]
# Wikipedia: a Kiwix ZIM (pre-rendered HTML). Empty => skipped.
zim_path   = ""
ocr        = true       # OCR scanned PDF pages that have no text layer

# ── retrieval ─────────────────────────────────────────────────────────────-─
default_k      = 5       # passages returned to the LM
shortlist      = 64      # candidates per arm before fusion/rerank (deeper => more recall)
min_confidence = 0.0     # below this top score => "KB lacks this" (web fallback)
# heuristic | none | cross-encoder. cross-encoder calls the local reranker
# endpoint and falls back to heuristic if it is unreachable.
rerank           = "heuristic"
rerank_url       = "http://127.0.0.1:11439"   # ./run-reranker.sh (llama.cpp --reranking, cpu)
rerank_model     = "bge-reranker-v2-m3-Q8_0.gguf"

log_level = "INFO"

# ── external-oracle consumer pack (VINUR-OPS-01) ────────────────────────────
# A coding-assistance (or other oracle-backed) overlay ships this fragment.
# The engine holds only the mechanisms; the region VALUES live here.
# Example — a Rust programme whose ids are minted under "rust:":
#   ops_regions        = ["rust=rust-coding"]      # id region -> domain facet tag
#   ask_exclude_facets = ["domain:rust-coding"]    # keep it out of conversation
